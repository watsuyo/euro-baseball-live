<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Euro Baseball Live</title>
<style>
  :root {
    --bg: #fafaf9;
    --surface: #fff;
    --border: #e5e7eb;
    --text: #4b5563;
    --text-h: #111827;
    --accent: #1d4ed8;
    --tag-bg: #f3f4f6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2d3140;
      --text: #d1d5db;
      --text-h: #f9fafb;
      --accent: #60a5fa;
      --tag-bg: #1f2233;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .container { max-width: 700px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 20px; font-weight: 800; color: var(--text-h); margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text); opacity: 0.7; margin-bottom: 16px; }
  .date-label { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 12px; }

  .list-section { margin-bottom: 16px; }
  .list-section-title {
    color: var(--text-h);
    opacity: 0.7;
    border-bottom: 1px solid var(--border);
    margin: 0 0 8px;
    padding-bottom: 4px;
    font-size: 13px;
    font-weight: 600;
  }

  .game-rows { display: flex; flex-direction: column; }
  .game-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    color: var(--text-h);
    font-size: 13px;
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
  }
  .game-row:first-child { border-radius: 6px 6px 0 0; }
  .game-row:last-child { border-bottom: none; border-radius: 0 0 6px 6px; }
  .game-row:only-child { border-radius: 6px; }
  .game-row:hover { background: var(--tag-bg); }
  .game-row.has-link { cursor: pointer; }
  .game-row.jp-team { border-left: 3px solid var(--accent); }
  .game-row-time {
    min-width: 34px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
  }
  .game-row-flag { flex-shrink: 0; font-size: 13px; }
  .game-row-matchup {
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .game-row-players {
    color: var(--accent);
    font-size: 11px;
    margin-left: auto;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .game-row-stream { flex-shrink: 0; font-size: 13px; margin-left: auto; }
  .game-row-players + .game-row-stream { margin-left: 6px; }

  .empty { text-align: center; padding: 40px; color: var(--text); opacity: 0.5; }
  .loading { text-align: center; padding: 40px; }
  .footer { text-align: center; margin-top: 24px; font-size: 12px; opacity: 0.5; }
  .footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <h1>⚾ Euro Baseball Live</h1>
  <div class="subtitle">今日の試合と配信（JST・28時制）</div>
  <div id="date-label" class="date-label"></div>
  <div id="content" class="loading">Loading...</div>
  <div class="footer"><a href="https://euro-baseball-viewer.vercel.app">euro-baseball-viewer.vercel.app</a></div>
</div>
<script>
const VIEWER_BASE = "https://euro-baseball-viewer.vercel.app/data";
const DAY_BOUNDARY_HOUR = 4;
const TARGET_TZ = "Asia/Tokyo";

function toDisplayTime28h(hhmm) {
  if (!hhmm || !/^\d{2}:\d{2}$/.test(hhmm)) return hhmm;
  const [h, m] = hhmm.split(":").map(Number);
  if (h < DAY_BOUNDARY_HOUR) return `${h + 24}:${String(m).padStart(2, "0")}`;
  return hhmm;
}

function flag(code) {
  if (!code || code.length !== 2) return "";
  return String.fromCodePoint(code.charCodeAt(0) + 0x1F1E6 - 65, code.charCodeAt(1) + 0x1F1E6 - 65);
}

function fmtParts(date, tz) {
  const f = new Intl.DateTimeFormat("en-US", {
    timeZone: tz, year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", hour12: false
  });
  const p = Object.fromEntries(f.formatToParts(date).map(x => [x.type, x.value]));
  if (p.hour === "24") p.hour = "00";
  return p;
}

function toJST(date, time, sourceTz) {
  if (!time) return { localDate: date, localTime: null };
  const src = sourceTz || "UTC";
  const [Y, M, D] = date.split("-").map(Number);
  const [h, m] = time.split(":").map(Number);
  const guess = Date.UTC(Y, M - 1, D, h, m);
  const p = fmtParts(new Date(guess), src);
  const shown = Date.UTC(+p.year, +p.month - 1, +p.day, +p.hour, +p.minute);
  const offset = shown - guess;
  const real = new Date(guess - offset);
  const jp = fmtParts(real, TARGET_TZ);
  return {
    localDate: `${jp.year}-${jp.month}-${jp.day}`,
    localTime: `${jp.hour}:${jp.minute}`,
  };
}

function todayJST() {
  const now = new Date();
  const p = fmtParts(now, TARGET_TZ);
  let Y = +p.year, M = +p.month, D = +p.day;
  if (+p.hour < DAY_BOUNDARY_HOUR) {
    const prev = new Date(Date.UTC(Y, M - 1, D) - 86400000);
    Y = prev.getUTCFullYear(); M = prev.getUTCMonth() + 1; D = prev.getUTCDate();
  }
  return `${Y}-${String(M).padStart(2,"0")}-${String(D).padStart(2,"0")}`;
}

function shiftDate(ymd, days) {
  const [Y, M, D] = ymd.split("-").map(Number);
  const t = new Date(Date.UTC(Y, M - 1, D) + days * 86400000);
  return `${t.getUTCFullYear()}-${String(t.getUTCMonth()+1).padStart(2,"0")}-${String(t.getUTCDate()).padStart(2,"0")}`;
}

function normTeam(s) {
  return String(s ?? "").toLowerCase().replace(/[^a-z0-9]+/g, "");
}

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

async function fetchJson(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${url} ${r.status}`);
  return r.json();
}

function renderDateLabel(today) {
  const [Y, M, D] = today.split("-").map(Number);
  const days = ["日","月","火","水","木","金","土"];
  const dow = new Date(Date.UTC(Y, M - 1, D)).getUTCDay();
  document.getElementById("date-label").textContent = `${Y}/${M}/${D}(${days[dow]}) JST`;
}

function collectTodayGames(schedule, today, webFallback) {
  const games = [];
  for (const [code, league] of Object.entries(schedule.leagues)) {
    for (const g of league.games) {
      const lt = toJST(g.date, g.time, g.tz);
      let effectiveDate = lt.localDate;
      if (lt.localTime) {
        const hh = +lt.localTime.split(":")[0];
        if (hh < DAY_BOUNDARY_HOUR) effectiveDate = shiftDate(lt.localDate, -1);
      }
      if (effectiveDate !== today) continue;
      const displayTime = lt.localTime ? toDisplayTime28h(lt.localTime) : "TBD";
      const stream = g.stream_url || webFallback.get(code) || null;
      games.push({
        time: displayTime,
        sortKey: displayTime === "TBD" ? "99:99" : displayTime,
        code,
        home: g.home || "?",
        away: g.away || "?",
        stream,
      });
    }
  }
  games.sort((a, b) => a.sortKey.localeCompare(b.sortKey));
  return games;
}

function buildWebFallback(streams) {
  const map = new Map();
  for (const lg of streams.leagues || []) {
    const web = (lg.streams || []).find(s => s.type === "web");
    if (web?.url) map.set(lg.code, web.url);
  }
  return map;
}

function buildJpIndex(jp) {
  // Map: normalized team name → [display names]
  const idx = new Map();
  for (const p of jp.players || []) {
    if (p.status !== "active") continue;
    const key = normTeam(p.team);
    if (!idx.has(key)) idx.set(key, []);
    idx.get(key).push(p.name_ja || p.name);
  }
  return idx;
}

function jpMatch(game, jpIndex) {
  const names = [];
  for (const side of [game.home, game.away]) {
    const hit = jpIndex.get(normTeam(side));
    if (hit) names.push(...hit);
  }
  return names;
}

function rowHtml(g, extra = "") {
  const tag = g.stream ? "a" : "div";
  const attrs = g.stream
    ? ` href="${escapeHtml(g.stream)}" target="_blank" rel="noopener" class="game-row has-link${extra ? " " + extra : ""}"`
    : ` class="game-row${extra ? " " + extra : ""}"`;
  const players = g.jpPlayers && g.jpPlayers.length
    ? `<span class="game-row-players">${escapeHtml(g.jpPlayers.join("・"))}</span>` : "";
  const stream = g.stream ? `<span class="game-row-stream">📺</span>` : "";
  return `<${tag}${attrs}>
    <span class="game-row-time">${escapeHtml(g.time)}</span>
    <span class="game-row-flag">${flag(g.code)}</span>
    <span class="game-row-matchup">${escapeHtml(g.home)} vs ${escapeHtml(g.away)}</span>
    ${players}${stream}
  </${tag}>`;
}

function render(schedule, jp, streams) {
  const today = todayJST();
  renderDateLabel(today);
  const webFallback = buildWebFallback(streams);
  const games = collectTodayGames(schedule, today, webFallback);
  const jpIndex = buildJpIndex(jp);

  const container = document.getElementById("content");
  container.classList.remove("loading");

  if (games.length === 0) {
    container.innerHTML = '<div class="empty">今日の試合はありません</div>';
    return;
  }

  const jpGames = games
    .map(g => ({ ...g, jpPlayers: jpMatch(g, jpIndex) }))
    .filter(g => g.jpPlayers.length > 0);

  let html = "";
  if (jpGames.length > 0) {
    html += '<section class="list-section"><h2 class="list-section-title">🇯🇵 日本人選手・指導者の所属チーム</h2><div class="game-rows">';
    html += jpGames.map(g => rowHtml(g, "jp-team")).join("");
    html += '</div></section>';
  }
  html += '<section class="list-section"><h2 class="list-section-title">今日の試合</h2><div class="game-rows">';
  html += games.map(g => rowHtml(g)).join("");
  html += '</div></section>';
  container.innerHTML = html;
}

async function load() {
  renderDateLabel(todayJST());
  try {
    const [schedule, jp, streams] = await Promise.all([
      fetchJson(`${VIEWER_BASE}/schedule.json`),
      fetchJson(`${VIEWER_BASE}/jp_players.json`).catch(() => ({ players: [] })),
      fetchJson(`${VIEWER_BASE}/streams.json`).catch(() => ({ leagues: [] })),
    ]);
    render(schedule, jp, streams);
  } catch (e) {
    document.getElementById("content").innerHTML = '<div class="empty">データ取得エラー</div>';
  }
}

load();
setInterval(load, 300000);
</script>
</body>
</html>
